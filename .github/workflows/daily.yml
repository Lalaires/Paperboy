name: Daily Research Briefing

on:
  schedule:
    # 10:30 Asia/Taipei (UTC+8) = 02:30 UTC. GitHub's cron can fire a few
    # minutes late under load, so treat this as "around 10:30", not exact.
    - cron: "30 2 * * *"
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  run-agent:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run agent and deliver
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
        run: python run_now.py

      - name: Persist dedup state
        run: |
          git config user.name "research-agent-bot"
          git config user.email "actions@github.com"
          git add seen_urls.txt
          git diff --staged --quiet || git commit -m "Update seen_urls.txt [skip ci]"
          git push
